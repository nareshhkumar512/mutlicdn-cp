apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xdeliveryservice-multi-cdn
spec:
  compositeTypeRef:
    apiVersion: delivery.bank.demo/v1alpha1
    kind: XDeliveryService
  mode: Pipeline
  pipeline:
    - step: render-resources
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: akamai-plan
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                providerConfigRef:
                  name: in-cluster
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: ConfigMap
                    metadata:
                      namespace: crossplane-system
                      name: placeholder
                      labels:
                        demo.bank.io/provider: akamai
                    data:
                      provider: akamai
                      serviceName: placeholder
                      team: placeholder
                      lob: placeholder
                      hostname: placeholder
                      sharedGateway: placeholder
                      pathPrefix: placeholder
                      originHost: placeholder
                      cacheTtlSeconds: placeholder
                      tlsMinVersion: placeholder
                      notes: "Rendered from canonical XDeliveryService by Crossplane"
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.serviceName
                toFieldPath: spec.forProvider.manifest.metadata.name
                transforms:
                  - type: string
                    string:
                      fmt: "%s-akamai-plan"
              - type: FromCompositeFieldPath
                fromFieldPath: spec.serviceName
                toFieldPath: spec.forProvider.manifest.data.serviceName
              - type: FromCompositeFieldPath
                fromFieldPath: spec.team
                toFieldPath: spec.forProvider.manifest.data.team
              - type: FromCompositeFieldPath
                fromFieldPath: spec.lob
                toFieldPath: spec.forProvider.manifest.data.lob
              - type: FromCompositeFieldPath
                fromFieldPath: spec.hostname
                toFieldPath: spec.forProvider.manifest.data.hostname
              - type: FromCompositeFieldPath
                fromFieldPath: spec.sharedGateway
                toFieldPath: spec.forProvider.manifest.data.sharedGateway
              - type: FromCompositeFieldPath
                fromFieldPath: spec.pathPrefix
                toFieldPath: spec.forProvider.manifest.data.pathPrefix
              - type: FromCompositeFieldPath
                fromFieldPath: spec.originHost
                toFieldPath: spec.forProvider.manifest.data.originHost
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cacheTtlSeconds
                toFieldPath: spec.forProvider.manifest.data.cacheTtlSeconds
                transforms:
                  - type: convert
                    convert:
                      toType: string
              - type: FromCompositeFieldPath
                fromFieldPath: spec.tlsMinVersion
                toFieldPath: spec.forProvider.manifest.data.tlsMinVersion
          - name: cloudflare-plan
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                providerConfigRef:
                  name: in-cluster
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: ConfigMap
                    metadata:
                      namespace: crossplane-system
                      name: placeholder
                      labels:
                        demo.bank.io/provider: cloudflare
                    data:
                      provider: cloudflare
                      serviceName: placeholder
                      team: placeholder
                      lob: placeholder
                      hostname: placeholder
                      sharedGateway: placeholder
                      pathPrefix: placeholder
                      originHost: placeholder
                      cacheTtlSeconds: placeholder
                      tlsMinVersion: placeholder
                      rulesetPhase: http_request_origin
                      notes: "Rendered from canonical XDeliveryService by Crossplane"
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.serviceName
                toFieldPath: spec.forProvider.manifest.metadata.name
                transforms:
                  - type: string
                    string:
                      fmt: "%s-cloudflare-plan"
              - type: FromCompositeFieldPath
                fromFieldPath: spec.serviceName
                toFieldPath: spec.forProvider.manifest.data.serviceName
              - type: FromCompositeFieldPath
                fromFieldPath: spec.team
                toFieldPath: spec.forProvider.manifest.data.team
              - type: FromCompositeFieldPath
                fromFieldPath: spec.lob
                toFieldPath: spec.forProvider.manifest.data.lob
              - type: FromCompositeFieldPath
                fromFieldPath: spec.hostname
                toFieldPath: spec.forProvider.manifest.data.hostname
              - type: FromCompositeFieldPath
                fromFieldPath: spec.sharedGateway
                toFieldPath: spec.forProvider.manifest.data.sharedGateway
              - type: FromCompositeFieldPath
                fromFieldPath: spec.pathPrefix
                toFieldPath: spec.forProvider.manifest.data.pathPrefix
              - type: FromCompositeFieldPath
                fromFieldPath: spec.originHost
                toFieldPath: spec.forProvider.manifest.data.originHost
              - type: FromCompositeFieldPath
                fromFieldPath: spec.cacheTtlSeconds
                toFieldPath: spec.forProvider.manifest.data.cacheTtlSeconds
                transforms:
                  - type: convert
                    convert:
                      toType: string
              - type: FromCompositeFieldPath
                fromFieldPath: spec.tlsMinVersion
                toFieldPath: spec.forProvider.manifest.data.tlsMinVersion
          - name: summary
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                providerConfigRef:
                  name: in-cluster
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: ConfigMap
                    metadata:
                      namespace: crossplane-system
                      name: placeholder
                      labels:
                        demo.bank.io/provider: summary
                    data:
                      summary: placeholder
                      architectureMessage: "One canonical API compiled into multiple provider-specific plans."
                      demoMessage: "Replace ConfigMaps with real Akamai/Cloudflare adapters in production."
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.serviceName
                toFieldPath: spec.forProvider.manifest.metadata.name
                transforms:
                  - type: string
                    string:
                      fmt: "%s-summary"
              - type: CombineFromComposite
                combine:
                  strategy: string
                  string:
                    fmt: "service=%s team=%s lob=%s host=%s gateway=%s origin=%s"
                  variables:
                    - fromFieldPath: spec.serviceName
                    - fromFieldPath: spec.team
                    - fromFieldPath: spec.lob
                    - fromFieldPath: spec.hostname
                    - fromFieldPath: spec.sharedGateway
                    - fromFieldPath: spec.originHost
                toFieldPath: spec.forProvider.manifest.data.summary
